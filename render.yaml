services:
  - type: web
    name: internal-booking
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    domains:
      - internalbooking.openframe.studio
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LARK_TIMEZONE
        value: Australia/Sydney
      - key: LARK_API_BASE
        value: https://open.larksuite.com/open-apis
      - key: LARK_APP_ID
        sync: false
      - key: LARK_APP_SECRET
        sync: false
      - key: LARK_CALENDAR_ID
        sync: false
      - key: LARK_ORGANIZER_CALENDAR_ID
        sync: false
      - key: LARK_SENDER_EMAIL
        value: admin@openframe.studio
      - key: LARK_SENDER_NAME
        value: admin@openframe.studio
      - key: INVOICE_EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_API_BASE
        value: https://api.resend.com
      - key: INVOICE_EMAIL_FROM
        value: OpenFrame Studio <admin@openframe.studio>
      - key: INVOICE_EMAIL_REPLY_TO
        value: admin@openframe.studio
      - key: INVOICE_EMAIL_BCC
        sync: false
      - key: INVOICE_EMAIL_HOST
        value: smtp.larksuite.com
      - key: INVOICE_EMAIL_PORT
        value: 465
      - key: INVOICE_EMAIL_SECURE
        value: true
      - key: INVOICE_EMAIL_USER
        value: admin@openframe.studio
      - key: INVOICE_EMAIL_PASSWORD
        sync: false
